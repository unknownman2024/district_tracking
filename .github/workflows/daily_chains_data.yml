name: Update Chain Daily Data

on:
  schedule:
    # Runs every 40 minutes
    - cron: "40 * * * *"   # Runs at the 30th minute of every hour (UTC)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Needed for proper pull -> rebase -> push sync

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pytz

      - name: Run update script
        run: python3 monthly_chains_bo.py

      - name: Commit & Push if Changed
        run: |
          git config user.name "GitHub Action"
          git config user.email "actions@github.com"

          git add -A

          # Check for changes
          if ! git diff --cached --quiet; then
            echo "📌 Changes detected — committing..."
            git commit -m "Auto update Monthly Chains Data | $(TZ='Asia/Kolkata' date '+%d %b %Y, %I:%M %p IST')"

            echo "📥 Pulling latest changes (rebase)..."
            git pull --rebase origin main || true

            echo "⬆ Pushing..."
            git push --force-with-lease origin main
          else
            echo "✔ No changes to commit."
          fi
