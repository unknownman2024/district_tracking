name: Test Cineplex BD Guest Click

on:
  workflow_dispatch:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install chromium

      - name: Run script (HEADLESS)
        run: |
          python bangla.py

      # 🔥 CRITICAL STEP — UPLOAD OUTPUT
      - name: Upload Bangladesh output
        uses: actions/upload-artifact@v4
        with:
          name: cineplex-debug-output
          path: Bangladesh/
          if-no-files-found: warn
