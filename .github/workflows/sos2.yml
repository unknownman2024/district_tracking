name: SOS2 Tracker

on:
  schedule:
    - cron: "*/30 * * * *"  # ⏱️ Every 30 minutes
  workflow_dispatch:        # 🖐️ Manual trigger via GitHub UI

jobs:
  run-sos2:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v3

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'  # or '20' if you're using latest

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Run sos2 script
        run: node sos2.js
