name: Update Monthly Chains Data

on:
  schedule:
    # Runs every 40 minutes
    - cron: "*/40 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pytz

      - name: Run update script
        run: python3 monthly_chains_bo.py

      - name: Commit & Push if Changed
        run: |
          git config user.name "GitHub Action"
          git config user.email "actions@github.com"

          # Add everything including new folders/files
          git add -A

          # If there are changes, commit and push
          if ! git diff --cached --quiet; then
            echo "📌 Changes detected — committing..."
            git commit -m "Auto update Monthly Chains Data | $(TZ='Asia/Kolkata' date '+%d %b %Y, %I:%M %p IST')"
            git push origin main
          else
            echo "✔ No changes to commit."
          fi
